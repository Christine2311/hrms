{% load static %}
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4 py-3 fixed-top">
    
    <div class="container-fluid">

        <!-- LEFT SIDE: Brand + Subtitle -->
        <div class="d-flex align-items-center">
            <span class="navbar-brand fw-bold text-primary me-4">
               SMART-HR RES
            </span>

            <span class="text-muted small">
                {% block page_subtitle %}{% endblock %}
            </span>
        </div>

        <!-- RIGHT SIDE: Notifications + User -->
        <div class="d-flex align-items-center gap-3 ms-auto">

            <!-- Notifications Dropdown -->
            <div class="dropdown">
                <button class="btn btn-light rounded-circle position-relative" data-bs-toggle="dropdown">
                    <i class="bi bi-bell fs-5"></i>

                    {% if unread_notifications.count > 0 %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        {{ unread_notifications.count }}
                    </span>
                    {% endif %}
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow border-0">

                    <li class="dropdown-header fw-bold">Notifications</li>

                    {% for n in unread_notifications %}
                        <li>
                            <a class="dropdown-item small" href="#">
                                {{ n.message }}
                            </a>
                        </li>
                    {% empty %}
                        <li>
                            <span class="dropdown-item text-muted small">
                                No new notifications
                            </span>
                        </li>
                    {% endfor %}

                </ul>
            </div>

            <!-- User Dropdown -->
            <div class="dropdown">
                <button class="btn btn-light rounded-pill px-3 d-flex align-items-center" data-bs-toggle="dropdown">

                    <i class="bi bi-person-circle me-2 fs-5"></i>

                    <span>{{ user.first_name }}</span>

                    <span class="badge bg-secondary ms-2 text-uppercase small">
                        {{ user.role }}
                    </span>

                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow border-0">

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-person me-2"></i> My Profile
                        </a>
                    </li>

                    <li>
                        <hr class="dropdown-divider">
                    </li>

                    <li>
                        <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                            <i class="bi bi-box-arrow-right me-2"></i> Logout
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </div>

</nav>
